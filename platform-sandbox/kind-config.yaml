# Local kind cluster — mounts repo root at /lab inside the node for eval Jobs.
# hostPath is relative to this config file (see kind docs).
# @see https://kind.sigs.k8s.io/docs/user/configuration/#extra-mounts
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: eval-lab
nodes:
  - role: control-plane
    extraMounts:
      - hostPath: ..
        containerPath: /lab
